<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — MyPortfolio</title>
  <link rel="stylesheet" href="styles/style.css">
  <link rel="stylesheet" href="styles/contact.css">
  <link rel="stylesheet" href="styles/light.css">
  <script src="https://unpkg.com/feather-icons"></script>
</head>
<body>

<header class="topbar">
  <div class="logotxt">
    <h1><span class="first">My</span><span class="second">Portfolio</span></h1>
  </div>
  <nav class="menu">
    <ul>
      <li><a href="homepage.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="project.html">Projects</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
      <li><a href="index.html" class="logout-btn">Logout</a></li>
    </ul>
  </nav>
</header>

<button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">
  <span class="knob">
    <i data-feather="moon"  class="icon-sun"></i>
    <i data-feather="sun"   class="icon-moon"></i>
  </span>
</button>

<main class="content">
  <div class="contact-layout">

    <!-- Left: Info -->
    <div class="contact-info">
      <div class="contact-info-card">
        <span class="section-tag">Contact</span>
        <h1 class="section-title" style="font-size:26px;margin-top:10px;">Get in Touch</h1>
        <p class="section-desc">
          Have a question, a project idea, or just want to say hi?
          Fill in the form and I'll get back to you.
        </p>

        <div class="contact-links">
          <a href="mailto:bryan@example.com" class="contact-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            bryan@example.com
          </a>
          <a href="https://github.com/" target="_blank" rel="noopener" class="contact-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
            </svg>
            GitHub Profile
          </a>
        </div>
      </div>
    </div>

    <!-- Right: Form -->
    <div class="contact-form-card">
      <h2 style="font-size:20px;font-weight:600;color:var(--text);margin-bottom:24px;">Send a Message</h2>

      <form id="contactForm" class="contact-form" novalidate>

        <div class="form-row">
          <div class="form-field">
            <label for="name">Name</label>
            <input type="text" id="name" placeholder="Your name" required>
            <div class="field-error" id="nameErr"></div>
          </div>

          <div class="form-field">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="you@example.com" required>
            <div class="field-error" id="emailErr"></div>
          </div>
        </div>

        <div class="form-field">
          <label for="subject">Subject</label>
          <input type="text" id="subject" placeholder="What's this about?">
        </div>

        <div class="form-field">
          <label for="message">Message</label>
          <textarea id="message" rows="6" placeholder="Write your message here…" required></textarea>
          <div class="field-error" id="msgErr"></div>
        </div>

        <div class="form-submit-row">
          <button type="submit" class="btn-primary">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
            Send Message
          </button>
          <span class="submit-status" id="submitStatus"></span>
        </div>

      </form>
    </div>

  </div>
</main>

<footer class="foot">
  <p>© 2026 Bryan Domingo · All rights reserved</p>
</footer>

<script src="scripts/script.js"></script>
</body>
</html>
