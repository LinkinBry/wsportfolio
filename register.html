<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — MyPortfolio</title>
  <link rel="stylesheet" href="styles/auth.css">
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-card">

      <!-- Brand -->
      <div class="auth-brand">
        <div class="logo-text"><span class="first">My</span><span class="second">Portfolio</span></div>
        <h2>Create account</h2>
        <p>Register to get started</p>
      </div>

      <!-- Register form -->
      <form id="registerForm" novalidate>

        <div class="form-field">
          <label for="regUsername">Username</label>
          <input type="text" id="regUsername" placeholder="Choose a username" autocomplete="username" required>
          <div class="field-error" id="usernameErr"></div>
        </div>

        <div class="form-field">
          <label for="regPassword">Password</label>
          <div class="pwd-wrapper">
            <input type="password" id="regPassword" placeholder="Min. 6 characters" autocomplete="new-password" required>
            <button type="button" id="toggleRegPass" class="eye-toggle" aria-label="Toggle password visibility">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div class="field-error" id="passwordErr"></div>
        </div>

        <div class="form-field">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="Repeat your password" autocomplete="new-password" required>
          <div class="field-error" id="confirmErr"></div>
        </div>

        <button type="submit" class="btn-auth" style="margin-top:8px;">Create Account</button>

      </form>

      <p class="auth-footer">
        Already have an account? <a href="index.html">Sign in</a>
      </p>

    </div>
  </div>

  <script src="scripts/auth.js"></script>
</body>
</html>
