<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — MyPortfolio</title>
  <link rel="stylesheet" href="styles/auth.css">
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-card">

      <!-- Brand -->
      <div class="auth-brand">
        <div class="logo-text"><span class="first">My</span><span class="second">Portfolio</span></div>
        <h2>Welcome back</h2>
        <p>Sign in to access your portfolio</p>
      </div>

      <!-- Login form -->
      <form id="userForm" novalidate>

        <div class="form-field">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter your username" autocomplete="username" required>
        </div>

        <div class="form-field">
          <label for="password">Password</label>
          <div class="pwd-wrapper">
            <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
            <button type="button" id="togglePass" class="eye-toggle" aria-label="Toggle password visibility">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div class="field-error" id="loginErr"></div>
        </div>

        <div class="form-options">
          <label>
            <input type="checkbox" id="rememberMe">
            Remember me
          </label>
        </div>

        <button type="submit" class="btn-auth">Sign In</button>

        <div class="auth-divider">or</div>

        <button type="button" id="googleLogin" class="btn-google">
          <img src="images/google-icon.png" alt="Google">
          Continue with Google
        </button>

      </form>

      <p class="auth-footer">
        Don't have an account? <a href="register.html">Create one free</a>
      </p>

    </div>
  </div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="scripts/auth.js"></script>
</body>
</html>
