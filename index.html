<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyPortfolio — Access</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/auth.css">
</head>
<body>

  <!-- Background mesh -->
  <div class="bg-mesh" aria-hidden="true">
    <div class="mesh-orb orb-a"></div>
    <div class="mesh-orb orb-b"></div>
  </div>
  <div class="bg-grid" aria-hidden="true"></div>

  <div class="auth-page">

    <!-- Logo mark -->
    <a class="auth-logo" href="#">
      <span class="al-my">My</span><span class="al-port">Portfolio</span>
    </a>

    <!-- Card -->
    <div class="auth-card" id="authCard">

      <!-- ── LOGIN VIEW ── -->
      <div class="av active" id="loginView">

        <div class="av-head">
          <div class="av-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          </div>
          <h1 class="av-title">Welcome back</h1>
          <p class="av-sub">Sign in to my portfolio</p>
        </div>

        <form id="loginForm" class="av-form" novalidate autocomplete="off">

          <div class="ff" id="fl-user">
            <label for="l-user">Username</label>
            <div class="ff-wrap">
              <input type="text" id="l-user" placeholder="your_username" autocomplete="username" spellcheck="false">
              <span class="ff-tick"></span>
            </div>
            <p class="ff-msg"></p>
          </div>

          <div class="ff" id="fl-pass">
            <div class="ff-lrow">
              <label for="l-pass">Password</label>
              <button type="button" class="ff-ghost">Forgot password?</button>
            </div>
            <div class="ff-wrap">
              <input type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password">
              <button type="button" class="ff-eye" data-for="l-pass" aria-label="Toggle password">
                <svg class="i-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="i-hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.77 21.77 0 0 1 5.06-6.94M9.88 9.88A3 3 0 0 0 12 15a3 3 0 0 0 2.12-5.12M1 1l22 22"/></svg>
              </button>
              <span class="ff-tick"></span>
            </div>
            <p class="ff-msg"></p>
          </div>

          <label class="ff-check">
            <input type="checkbox" id="rememberMe">
            <span class="ff-box"></span>
            Keep me signed in
          </label>

          <div class="ff-banner" id="loginErr"></div>

          <button type="submit" class="ff-submit" id="loginBtn">
            <span class="ff-btn-txt">Sign In</span>
            <svg class="ff-btn-arr" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            <span class="ff-spin"></span>
          </button>

          <div class="ff-or"><span>or</span></div>

          <button type="button" id="googleLoginBtn" class="ff-google">
            <svg viewBox="0 0 24 24" width="16" height="16">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Continue with Google
          </button>

        </form>

        <p class="av-foot">No account? <button class="av-switch" data-to="register">Create one free →</button></p>

      </div>

      <!-- ── REGISTER VIEW ── -->
      <div class="av" id="registerView">

        <div class="av-head">
          <div class="av-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
          </div>
          <h1 class="av-title">Create account</h1>
          <p class="av-sub">Join and start showcasing your work</p>
        </div>

        <form id="registerForm" class="av-form" novalidate autocomplete="off">

          <!-- Row: username + email -->
          <div class="ff-grid2">
            <div class="ff" id="fr-user">
              <label for="r-user">Username</label>
              <div class="ff-wrap">
                <input type="text" id="r-user" placeholder="choose_one" spellcheck="false">
                <span class="ff-tick"></span>
              </div>
              <p class="ff-msg"></p>
            </div>

            <div class="ff" id="fr-email">
              <label for="r-email">Email <em class="ff-opt">optional</em></label>
              <div class="ff-wrap">
                <input type="email" id="r-email" placeholder="you@mail.com">
                <span class="ff-tick"></span>
              </div>
              <p class="ff-msg"></p>
            </div>
          </div>

          <!-- Row: password + confirm -->
          <div class="ff-grid2">
            <div class="ff" id="fr-pass">
              <label for="r-pass">Password</label>
              <div class="ff-wrap">
                <input type="password" id="r-pass" placeholder="••••••••" autocomplete="new-password">
                <button type="button" class="ff-eye" data-for="r-pass" aria-label="Toggle password">
                  <svg class="i-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  <svg class="i-hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.77 21.77 0 0 1 5.06-6.94M9.88 9.88A3 3 0 0 0 12 15a3 3 0 0 0 2.12-5.12M1 1l22 22"/></svg>
                </button>
                <span class="ff-tick"></span>
              </div>
              <p class="ff-msg"></p>
            </div>

            <div class="ff" id="fr-confirm">
              <label for="r-confirm">Confirm</label>
              <div class="ff-wrap">
                <input type="password" id="r-confirm" placeholder="••••••••" autocomplete="new-password">
                <span class="ff-tick"></span>
              </div>
              <p class="ff-msg"></p>
            </div>
          </div>

          <!-- Strength bar + requirement pills -->
          <div class="pw-meta">
            <div class="pw-track">
              <span class="pw-seg" id="seg0"></span>
              <span class="pw-seg" id="seg1"></span>
              <span class="pw-seg" id="seg2"></span>
              <span class="pw-seg" id="seg3"></span>
              <span class="pw-lbl" id="pwLbl"></span>
            </div>
            <div class="pw-pills">
              <span class="pw-pill" id="req-len">8+ chars</span>
              <span class="pw-pill" id="req-up">A–Z</span>
              <span class="pw-pill" id="req-num">0–9</span>
              <span class="pw-pill" id="req-sym">#$!</span>
            </div>
          </div>

          <div class="ff-banner" id="registerErr"></div>

          <button type="submit" class="ff-submit" id="registerBtn">
            <span class="ff-btn-txt">Create Account</span>
            <svg class="ff-btn-arr" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            <span class="ff-spin"></span>
          </button>

        </form>

        <p class="av-foot">Already have an account? <button class="av-switch" data-to="login">Sign in →</button></p>

      </div>

    </div><!-- /auth-card -->

    <p class="auth-copy">© 2026 Bryan Jay L. Domingo · All rights reserved</p>

  </div><!-- /auth-page -->

  <div class="toast-rack" id="toastRack"></div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="scripts/auth.js"></script>
</body>
</html>
